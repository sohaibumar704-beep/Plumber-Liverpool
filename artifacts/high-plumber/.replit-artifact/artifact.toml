kind = "web"
previewPath = "/"
title = "High Plumber in Liverpool"
version = "1.0.0"
id = "artifacts/high-plumber"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22121

[services.development]
run = "pnpm --filter @workspace/high-plumber run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/high-plumber", "run", "build" ]
publicDir = "artifacts/high-plumber/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22121"
BASE_PATH = "/"
